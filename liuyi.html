<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>六义</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: "Ma Shan Zheng","KaiTi",serif;
    background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 40%, #f5f5f5 100%);
    color: #1a1a1a;
    line-height: 2;
    min-height: 100vh;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: 
        radial-gradient(circle at 20% 30%, rgba(0,0,0,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}
.container {
    max-width: 800px;
    margin: 100px auto 120px;
    padding: 0 40px;
    position: relative;
    z-index: 1;
}
h2 {
    font-size: 36px;
    letter-spacing: 12px;
    color: #1a1a1a;
    writing-mode: vertical-rl;
    text-orientation: upright;
    position: fixed;
    left: 60px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.15;
    font-size: 60px;
    pointer-events: none;
}
h3 {
    font-size: 26px;
    letter-spacing: 10px;
    color: #8b0000;
    border-left: 3px solid #8b0000;
    padding-left: 14px;
    margin-bottom: 30px;
}
.section {
    margin-bottom: 60px;
    padding: 40px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
}
p {
    font-size: 17px;
    text-indent: 2em;
    letter-spacing: 2px;
    margin-bottom: 16px;
    color: #333;
}
.term {
    display: inline-block;
    font-size: 20px;
    color: #8b0000;
    letter-spacing: 4px;
    margin: 8px 0;
}
.back {
    display: inline-block;
    margin-top: 40px;
    font-size: 16px;
    letter-spacing: 6px;
    color: #8b0000;
    text-decoration: none;
    border: 1px solid #8b0000;
    padding: 8px 24px;
    transition: all .3s;
}
.back:hover {
    background: #8b0000;
    color: #fff;
}
</style>
</head>
<body>

<div class="container">
    <h2>六义</h2>

    <div class="section">
        <h3>诗之六义</h3>
        <p>
            《周礼·春官》载："教六诗：曰风，曰赋，曰比，曰兴，曰雅，曰颂。"
            后《毛诗序》统称"六义"，实为《诗经》之灵魂骨架。
        </p>
    </div>

    <div class="section">
        <h3>风雅颂 · 诗之体</h3>
        <p>
            <span class="term">风</span>者，民俗歌谣，采于诸侯之国，多男女情思、民情风俗。
            <span class="term">雅</span>者，朝廷之音，分大雅、小雅，多为贵族宴饮、朝会之作。
            <span class="term">颂</span>者，宗庙祭祀之乐歌，庄重肃穆，歌颂先王功德。
        </p>
    </div>

    <div class="section">
        <h3>赋比兴 · 诗之用</h3>
        <p>
            <span class="term">赋</span>者，敷陈其事而直言之，即直叙手法。
            <span class="term">比</span>者，以彼物比此物，即比喻寄托。
            <span class="term">兴</span>者，先言他物以引起所咏之辞，即触物起情。
        </p>
        <p>
            六义之中，风雅颂为诗之体，赋比兴为诗之用。体用兼备，然后成诗。
            自汉以来，说诗者莫不本于此。
        </p>
    </div>

    <a href="qingdeng.html" class="back">← 返回青灯黄卷</a>
</div>

</body>
</html>
